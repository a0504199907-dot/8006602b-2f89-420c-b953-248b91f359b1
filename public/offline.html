<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>אופליין - הציבור החרדי</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Heebo', system-ui, sans-serif;
      background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
    }
    
    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #d4af37 0%, #b8960c 100%);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    h1 {
      font-size: 28px;
      margin-bottom: 15px;
      color: #d4af37;
    }
    
    p {
      font-size: 16px;
      color: #999;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    
    .retry-btn {
      display: inline-block;
      padding: 15px 40px;
      background: linear-gradient(135deg, #d4af37 0%, #b8960c 100%);
      color: #000;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
    }
    
    .cached-pages {
      margin-top: 40px;
      padding-top: 30px;
      border-top: 1px solid #333;
    }
    
    .cached-pages h3 {
      font-size: 16px;
      color: #666;
      margin-bottom: 15px;
    }
    
    .cached-pages a {
      display: inline-block;
      padding: 8px 16px;
      margin: 5px;
      background: #222;
      color: #d4af37;
      text-decoration: none;
      border-radius: 20px;
      font-size: 14px;
      transition: background 0.2s;
    }
    
    .cached-pages a:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>אין חיבור לאינטרנט</h1>
    <p>
      נראה שאתה לא מחובר לרשת כרגע.<br>
      בדוק את החיבור ונסה שוב.
    </p>
    <button class="retry-btn" onclick="location.reload()">
      🔄 נסה שוב
    </button>
    
    <div class="cached-pages">
      <h3>דפים שמורים במכשיר:</h3>
      <a href="/">🏠 דף הבית</a>
      <a href="/news">📰 חדשות</a>
      <a href="/gallery">🖼️ גלריות</a>
    </div>
  </div>
  
  <script>
    // בדוק חיבור כל 5 שניות
    setInterval(() => {
      fetch('/', { method: 'HEAD', cache: 'no-store' })
        .then(() => location.reload())
        .catch(() => {});
    }, 5000);
  </script>
</body>
</html>
